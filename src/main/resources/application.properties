spring.application.name=springbootprojstructure

# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:umdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging to root file: user-prompt.log
logging.file.name=user-prompt.log
logging.level.root=INFO

# Optional: also log web requests via our interceptor
logging.level.com.um.springbootprojstructure=INFO

# Store "prompts" already given
app.promptlog.initial[0]=You are code assistant for writing code for Spring boot application. Consider to give all necessary code for a new application, and use Gradle build tool. Include the package name, file location considering the following project source code packages under the main package com.um.springbootprojstructure: config, controller, dto, entity, mapper, repository, service. with application.properties file.
app.promptlog.initial[1]=You are coding assesstent to build a Java Spring Boot backend application. Context: Goal: a user-management module. Use Spring Boot and gradle as the build tool. Use an in-memory database (H2). Dont create any user interface, only use java spring boot to create the spring backend application. Log all prompts and input I gave to u should be logged into a log file under the root folder named "user-prompt.log". I’ll paste the task set requirements next. Lets start with implementing the user entity and services to use them in the next tasks.

# Admin bootstrap (test setup)
app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@local.test
app.bootstrap.admin.firstName=System
app.bootstrap.admin.lastName=Administrator
app.bootstrap.admin.password=admin123

# JWT config
app.security.jwt.issuer=um-backend
app.security.jwt.accessTokenTtlSeconds=900
app.security.jwt.refreshTokenTtlSeconds=604800

# For dev only: at least 32 chars. Change in real deployments.
app.security.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS

# LDAP validation
app.ldap.mock=true

# Used when app.ldap.mock=false
spring.ldap.urls=ldap://localhost:389
spring.ldap.base=dc=example,dc=com
spring.ldap.username=cn=admin,dc=example,dc=com
spring.ldap.password=admin

# Search settings (adjust to your enterprise directory)
app.ldap.userSearchBase=ou=people
app.ldap.userObjectClass=person